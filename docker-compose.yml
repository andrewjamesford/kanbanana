version: "3.9"

services:
  mongodb:
    image: mongo:7
    container_name: kanbanana-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: kanbanana-api
    environment:
      NODE_ENV: development
      PORT: 4100
      MONGODB_URI: mongodb://mongodb:27017/kanbanana
    ports:
      - "4100:4100"
    depends_on:
      - mongodb

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: kanbanana-web
    environment:
      VITE_API_URL: http://localhost:4100
    ports:
      - "3100:3100"
    depends_on:
      - api

volumes:
  mongodb_data:
